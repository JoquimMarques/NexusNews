{% extends "base.html" %}

{% block content %}
<div class="auth-page">

    <!-- PAINEL ESQUERDO — decorativo -->
    <div class="auth-panel">
        <div class="auth-panel-logo">
            <span class="auth-panel-logo-text">Nexus<span>News</span></span>
        </div>
        <div class="auth-panel-headline">
            <h2>Bem-vindo de volta.</h2>
            <p>O seu portal de inteligência informativa, alimentado por IA.</p>
        </div>
        <div class="auth-panel-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- PAINEL DIREITO — formulário -->
    <div class="auth-form-panel">
        <div class="auth-form-box">

            <div class="auth-form-header">
                <div class="auth-form-icon">
                    <i data-lucide="log-in"></i>
                </div>
                <h1 class="auth-form-title">Entrar</h1>
                <p class="auth-form-sub">Aceda ao seu feed personalizado</p>
            </div>

            <form action="{{ url_for('auth.login') }}" method="post" class="auth-form">

                <div class="auth-field">
                    <label class="auth-label" for="email">
                        <i data-lucide="mail"></i> E-mail
                    </label>
                    <input class="auth-input" type="email" id="email" name="email"
                           placeholder="exemplo@email.com" required autocomplete="email">
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="password">
                        <i data-lucide="lock"></i> Palavra-passe
                    </label>
                    <input class="auth-input" type="password" id="password" name="password"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="auth-submit-btn">
                    <i data-lucide="zap"></i>
                    Aceder ao Feed
                </button>
            </form>

            <p class="auth-switch">
                Não tem conta?
                <a href="{{ url_for('auth.register') }}">Registe-se aqui</a>
            </p>
        </div>
    </div>

</div>
{% endblock %}
